<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Intelligent Forecast</title>
    <meta
      name="description"
      content="Intelligent Forecast — deterministic MEDDPICC + pipeline-hygiene rules flag every at-risk deal; the model only explains and routes."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      * { box-sizing: border-box; }
      html, body, #root { margin: 0; padding: 0; }
      body {
        font-family: "IBM Plex Sans", system-ui, sans-serif;
        -webkit-font-smoothing: antialiased;
        background: oklch(0.985 0.002 255);
        color: oklch(0.26 0.012 260);
      }
      ::-webkit-scrollbar { width: 10px; height: 10px; }
      ::-webkit-scrollbar-thumb {
        background: oklch(0.88 0.005 250);
        border-radius: 8px;
        border: 2px solid transparent;
        background-clip: padding-box;
      }
      input::placeholder { color: oklch(0.62 0.01 250); }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
